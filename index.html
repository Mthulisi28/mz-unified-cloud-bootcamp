<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MZ Unified LMS Dashboard</title>

  <base href="/mz-unified-cloud-bootcamp/">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 1000;
    }

    .brand-center {
      text-align: center;
      flex: 1;
    }

    .brand-center h1 {
      margin: 0;
      font-size: 18px;
      color: #38bdf8;
    }

    .brand-center p {
      margin: 0;
      font-size: 12px;
      color: #94a3b8;
    }

    .profile {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }

    .logo {
      width: 70px;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      top: 90px;
      left: 0;
      width: 280px;
      height: calc(100vh - 90px);
      background: #0f172a;
      padding: 20px;
    }

    .session {
      padding: 12px;
      margin-bottom: 10px;
      background: #111827;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #1f2937;
    }

    .locked {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .unlocked {
      border-left: 3px solid #38bdf8;
    }

    /* ===== MAIN ===== */
    .main {
      margin-left: 280px;
      padding: 120px 40px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-bottom: 20px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .score {
      font-size: 20px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <img src="assets/images/mthulisi.png" class="profile">

  <div class="brand-center">
    <h1>◆ MZ LMS Dashboard</h1>
    <p>Enterprise Cloud Governance Training System</p>
  </div>

  <img src="assets/images/mz-logo.png" class="logo">
</div>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>Sessions</h3>

  <div id="s1" class="session unlocked" onclick="openSession(1)">01 - Cloud Foundations</div>
  <div id="s2" class="session locked" onclick="openSession(2)">02 - Shared Responsibility</div>
  <div id="s3" class="session locked" onclick="openSession(3)">03 - IAM Deep Dive</div>
  <div id="s4" class="session locked" onclick="openSession(4)">04 - VPC Networking</div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="card">
    <h2>Session Panel</h2>
    <p id="sessionText">Select a session</p>
  </div>

  <div class="card">
    <h2>Mini Assessment</h2>

    <p>What is AWS IAM used for?</p>

    <button onclick="answer(true)">Identity & Access Control</button>
    <button onclick="answer(false)">Networking</button>

    <p class="score" id="score">Score: 0</p>
  </div>

</div>

<script>
let score = parseInt(localStorage.getItem("score") || "0");
let unlocked = JSON.parse(localStorage.getItem("unlocked") || "[1]");

document.getElementById("score").innerText = "Score: " + score;

function refreshUI(){
  for(let i=1;i<=4;i++){
    const el = document.getElementById("s"+i);

    if(unlocked.includes(i)){
      el.classList.remove("locked");
      el.classList.add("unlocked");
    } else {
      el.classList.add("locked");
    }
  }
}

function openSession(id){
  if(!unlocked.includes(id)) return;

  document.getElementById("sessionText").innerText =
    "You are viewing Session " + id;

  if(id < 4 && !unlocked.includes(id+1)){
    unlocked.push(id+1);
    localStorage.setItem("unlocked", JSON.stringify(unlocked));
    refreshUI();
  }
}

function answer(correct){
  if(correct){
    score += 10;
    localStorage.setItem("score", score);
    document.getElementById("score").innerText = "Score: " + score;
  }
}

refreshUI();
</script>

</body>
</html>
