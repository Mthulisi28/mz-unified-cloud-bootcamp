<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MZ Unified Cloud Bootcamp LMS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
}

/* ===== TOPBAR ===== */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 90px;
  background: #111827;
  border-bottom: 1px solid #1f2937;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
}

.profile {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #38bdf8;
}

.logo {
  width: 70px;
}

.brand-center {
  text-align: center;
  flex: 1;
}

.brand-center h1 {
  margin: 0;
  font-size: 18px;
  color: #38bdf8;
}

.brand-center p {
  margin: 0;
  font-size: 12px;
  color: #94a3b8;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  top: 90px;
  left: 0;
  width: 280px;
  height: calc(100vh - 90px);
  background: #0f172a;
  padding: 20px;
}

.session {
  padding: 10px;
  margin-bottom: 8px;
  background: #111827;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.session:hover {
  background: #1f2937;
  border-left: 3px solid #38bdf8;
  transform: translateX(3px);
}

/* ===== MAIN ===== */
.main {
  margin-left: 280px;
  padding: 120px 40px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  margin-bottom: 20px;
}

.session-title {
  color: #38bdf8;
  font-size: 18px;
  margin-bottom: 10px;
}

.version {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 11px;
  color: #64748b;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <img src="assets/images/mthulisi.png" class="profile">

  <div class="brand-center">
    <h1>◆ MZ Unified Cloud Bootcamp</h1>
    <p>Student Learning System</p>
  </div>

  <img src="assets/images/mz-logo.png" class="logo">
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Sessions</h3>

  <div class="session" onclick="openSession(1)">01 - Cloud Foundations</div>
  <div class="session" onclick="openSession(2)">02 - Shared Responsibility</div>
  <div class="session" onclick="openSession(3)">03 - IAM Deep Dive</div>
  <div class="session" onclick="openSession(4)">04 - VPC Networking</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="card">
    <h2>Student Dashboard</h2>
    <p id="sessionView">Select a session to begin</p>
  </div>

  <div class="card" id="contentBox">
    <div class="session-title" id="sessionTitle"></div>
    <p id="sessionContent">Session content will appear here.</p>
  </div>

</div>

<div class="version">v5.0.0-clean</div>

<script>

/* ===== SESSION CONTENT ===== */
const sessions = {
  1: {
    title: "Cloud Foundations",
    content: "Introduction to cloud computing, AWS global infrastructure, regions, availability zones, and core service models (IaaS, PaaS, SaaS)."
  },
  2: {
    title: "Shared Responsibility",
    content: "Understanding the shared responsibility model: AWS secures the cloud, you secure what you deploy. Risk boundaries and compliance fundamentals."
  },
  3: {
    title: "IAM Deep Dive",
    content: "Identity and Access Management: users, groups, roles, policies, least privilege principle, and security best practices."
  },
  4: {
    title: "VPC Networking",
    content: "Virtual Private Cloud architecture, subnets, route tables, internet gateways, NAT, and network segmentation design."
  }
};

/* ===== OPEN SESSION ===== */
window.openSession = function(id) {

  const session = sessions[id];

  if (!session) return;

  document.getElementById("sessionView").innerText =
    "Viewing: " + session.title;

  document.getElementById("sessionTitle").innerText =
    session.title;

  document.getElementById("sessionContent").innerText =
    session.content;
};

/* ===== INIT ===== */
window.onload = function () {
  document.getElementById("sessionView").innerText =
    "Select a session to begin";
};

</script>

</body>
</html>
