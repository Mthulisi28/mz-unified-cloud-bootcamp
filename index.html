<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MZ UCA | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #010409; color: #f0f6fc; }
        .gold-ink { color: #d4af37; }
        .session-card { background: #0d1117; border: 1px solid #30363d; padding: 2rem; }
        .session-card:hover { border-color: #d4af37; }
        .btn-action { background: #d4af37; color: #000; font-weight: 900; display: block; text-align: center; padding: 1rem; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-5xl mx-auto">
        <header class="mb-20 text-center">
            <h1 class="text-6xl font-black italic gold-ink">MZ UCA BOOT CAMP</h1>
        </header>

        <div class="bg-[#0d1117] border border-gray-800 p-8 mb-12 flex items-center">
            <img src="profile-main.jpg" class="w-32 h-32 border-2 border-[#d4af37] object-cover mr-8" onerror="this.src='https://via.placeholder.com/150?text=Check+Filename'">
            <div>
                <h2 class="text-3xl font-bold uppercase italic">Mthulisi Zulu</h2>
                <p class="gold-ink tracking-widest text-sm">GLOBAL SYSTEMS ARCHITECT</p>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="session-card">
                <h3 class="mb-4 font-bold uppercase text-gray-400 text-xs">Module 01</h3>
                <a href="m1-practitioner.pdf" target="_blank" class="btn-action">View Document</a>
            </div>
            <div class="session-card">
                <h3 class="mb-4 font-bold uppercase text-gray-400 text-xs">Module 02</h3>
                <a href="m1-architect.pdf" target="_blank" class="btn-action">View Document</a>
            </div>
            <div class="session-card">
                <h3 class="mb-4 font-bold uppercase text-gray-400 text-xs">Module 03</h3>
                <a href="m2-architect.pdf" target="_blank" class="btn-action">View Document</a>
            </div>
        </div>
    </div>
</body>
</html>
