<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MZ Unified Cloud Bootcamp</title>

  <style>

    body{
      background:#0b1220;
      color:white;
      font-family:Arial;
      padding:40px;
    }

    h1{
      color:#38bdf8;
    }

    .session{
      background:#111827;
      padding:20px;
      margin-bottom:15px;
      border-radius:8px;
      cursor:pointer;
    }

    .session:hover{
      background:#1f2937;
    }

    #viewer{
      margin-top:30px;
      background:#111827;
      padding:20px;
      border-radius:8px;
    }

  </style>

</head>

<body>

<h1>MZ Unified Cloud Bootcamp</h1>

<div class="session" onclick="showSession(1)">
  Session 1 - Cloud Foundations
</div>

<div class="session" onclick="showSession(2)">
  Session 2 - IAM
</div>

<div id="viewer">
  Select a session
</div>

<script>

function showSession(id){

  let viewer =
    document.getElementById("viewer");

  if(id === 1){

    viewer.innerHTML =
      "<h2>Cloud Foundations</h2><p>Introduction to AWS Cloud.</p>";

  }

  if(id === 2){

    viewer.innerHTML =
      "<h2>IAM</h2><p>Identity and Access Management.</p>";

  }

}

</script>

</body>
</html>
