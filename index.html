<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MZ LMS - Student Portal</title>

  <base href="/mz-unified-cloud-bootcamp/">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    /* ===== LOGIN SCREEN ===== */
    .login-screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .login-box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #1f2937;
      width: 320px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 95%;
    }

    /* ===== APP ===== */
    .app {
      display: none;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
    }

    .profile {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }

    .logo {
      width: 70px;
    }

    .sidebar {
      position: fixed;
      top: 90px;
      left: 0;
      width: 280px;
      height: calc(100vh - 90px);
      background: #0f172a;
      padding: 20px;
    }

    .main {
      margin-left: 280px;
      padding: 120px 40px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-bottom: 20px;
    }

    .session {
      padding: 10px;
      margin-bottom: 8px;
      background: #111827;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">

  <div class="login-box">
    <h2>Student Login</h2>

    <input type="text" id="studentName" placeholder="Enter your name">
    <input type="text" id="studentId" placeholder="Enter student ID">

    <button onclick="login()">Enter LMS</button>
  </div>

</div>

<!-- APP -->
<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="topbar">

    <img src="assets/images/mthulisi.png" class="profile">

    <div>
      <h3 id="welcomeText">Welcome</h3>
    </div>

    <img src="assets/images/mz-logo.png" class="logo">

  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Sessions</h3>
    <div class="session">01 - Cloud Foundations</div>
    <div class="session">02 - Shared Responsibility</div>
    <div class="session">03 - IAM Deep Dive</div>
    <div class="session">04 - VPC Networking</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="card">
      <h2>Dashboard</h2>
      <p id="studentInfo"></p>
    </div>

  </div>

</div>

<script>
function login(){

  const name = document.getElementById("studentName").value;
  const id = document.getElementById("studentId").value;

  if(!name || !id){
    alert("Please enter both fields");
    return;
  }

  // store session
  localStorage.setItem("studentName", name);
  localStorage.setItem("studentId", id);

  // switch UI
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  // personalize
  document.getElementById("welcomeText").innerText = "Welcome, " + name;
  document.getElementById("studentInfo").innerText = "Student ID: " + id;
}

// auto-login if already stored
window.onload = function(){
  const name = localStorage.getItem("studentName");
  const id = localStorage.getItem("studentId");

  if(name && id){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcomeText").innerText = "Welcome, " + name;
    document.getElementById("studentInfo").innerText = "Student ID: " + id;
  }
}
</script>

</body>
</html>
