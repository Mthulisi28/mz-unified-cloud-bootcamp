<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MZ Unified Cloud Bootcamp LMS</title>

  <base href="/mz-unified-cloud-bootcamp/">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    /* ================= LOGIN ================= */
    .login-screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #1f2937;
      width: 340px;
      text-align: center;
    }

    input {
      width: 92%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 95%;
      margin-top: 10px;
    }

    /* ================= APP ================= */
    .app {
      display: none;
    }

    /* ================= TOPBAR ================= */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 1000;
    }

    .profile {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #38bdf8;
    }

    .logo {
      width: 70px;
    }

    .brand-center {
      text-align: center;
      flex: 1;
    }

    .brand-center h1 {
      margin: 0;
      font-size: 18px;
      color: #38bdf8;
    }

    .brand-center p {
      margin: 0;
      font-size: 12px;
      color: #94a3b8;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      position: fixed;
      top: 90px;
      left: 0;
      width: 280px;
      height: calc(100vh - 90px);
      background: #0f172a;
      padding: 20px;
    }

    .session {
      padding: 10px;
      margin-bottom: 8px;
      background: #111827;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .session:hover {
      background: #1f2937;
      transform: translateX(4px);
      border-left: 3px solid #38bdf8;
    }

    /* ================= MAIN ================= */
    .main {
      margin-left: 280px;
      padding: 120px 40px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-bottom: 20px;
    }

    .score {
      color: #22c55e;
      font-size: 18px;
    }

    #quizBox {
      display: none;
    }

  </style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div class="login-screen" id="loginScreen">

  <div class="login-box">
    <h2>Student Login</h2>

    <input type="text" id="studentName" placeholder="Enter full name">
    <input type="text" id="studentId" placeholder="Enter phone (0821234567)">

    <button onclick="login()">Enter LMS</button>
  </div>

</div>

<!-- ================= APP ================= -->
<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="topbar">

    <img src="assets/images/mthulisi.png" class="profile">

    <div class="brand-center">
      <h1>◆ MZ Unified Cloud Bootcamp</h1>
      <p id="welcomeText">Welcome</p>
    </div>

    <img src="assets/images/mz-logo.png" class="logo">

  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Sessions</h3>

    <div class="session" onclick="openSession(1)">01 - Cloud Foundations</div>
    <div class="session" onclick="openSession(2)">02 - Shared Responsibility</div>
    <div class="session" onclick="openSession(3)">03 - IAM Deep Dive</div>
    <div class="session" onclick="openSession(4)">04 - VPC Networking</div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="card">
      <h2>Student Dashboard</h2>
      <p id="studentInfo"></p>
      <p id="sessionView">Select a session</p>
    </div>

    <!-- QUIZ -->
    <div class="card" id="quizBox">

      <h2>Mini Assessment</h2>

      <p id="questionText"></p>

      <button onclick="answer('A')">Option A</button>
      <button onclick="answer('B')">Option B</button>

      <p class="score" id="score">Score: 0</p>

    </div>

  </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>

let score = 0;
let currentCorrect = null;

// LOGIN
function login(){

  const name = document.getElementById("studentName").value.trim();
  const id = document.getElementById("studentId").value.trim();

  const phoneRegex = /^0[6-8][0-9]{8}$/;

  if(!name || !id){
    alert("Fill all fields");
    return;
  }

  if(!phoneRegex.test(id)){
    alert("Invalid phone number");
    return;
  }

  localStorage.setItem("studentName", name);
  localStorage.setItem("studentId", id);

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcomeText").innerText = "Welcome, " + name;
  document.getElementById("studentInfo").innerText = "Student ID: " + id;
}

// SESSION DATA
const sessions = {
  1: {
    title: "Cloud Foundations",
    question: "What is a cloud region in AWS?",
    correct: "A"
  },
  2: {
    title: "Shared Responsibility",
    question: "Who secures infrastructure in AWS?",
    correct: "B"
  },
  3: {
    title: "IAM Deep Dive",
    question: "What is IAM used for?",
    correct: "A"
  },
  4: {
    title: "VPC Networking",
    question: "What does a VPC control?",
    correct: "B"
  }
};

// OPEN SESSION
function openSession(id){

  const session = sessions[id];

  currentCorrect = session.correct;

  document.getElementById("sessionView").innerText =
    "Viewing Session " + id + " - " + session.title;

  document.getElementById("quizBox").style.display = "block";
  document.getElementById("questionText").innerText = session.question;
}

// ANSWER CHECK
function answer(selected){

  if(selected === currentCorrect){
    score += 10;
    document.getElementById("score").innerText = "Score: " + score;
  } else {
    alert("Incorrect answer");
  }
}

// AUTO LOGIN
window.onload = function(){

  const name = localStorage.getItem("studentName");
  const id = localStorage.getItem("studentId");

  if(name && id){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcomeText").innerText = "Welcome back, " + name;
    document.getElementById("studentInfo").innerText = "Student ID: " + id;
  }
}

</script>

</body>
</html>
