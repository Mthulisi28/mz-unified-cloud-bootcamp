<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCA COMMAND CENTER | MTHULISI ZULU</title>
    <style>
        :root { --primary: #3b82f6; --bg: #030712; --card: #111827; --text: #f9fafb; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { height: 80px; background: var(--card); border-bottom: 2px solid #1f2937; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 340px; background: #000; border-right: 1px solid #1f2937; padding: 25px; overflow-y: auto; }
        #content { flex: 1; padding: 60px; overflow-y: auto; }
        .nav-item { display: block; width: 100%; padding: 18px; margin-bottom: 12px; background: #1f2937; color: #fff; border: 1px solid transparent; text-align: left; cursor: pointer; border-radius: 10px; font-weight: 600; transition: 0.2s; }
        .nav-item:hover { border-color: var(--primary); background: #1e3a8a; }
        .nav-item.active { border-color: var(--primary); background: #2563eb; box-shadow: 0 0 15px rgba(37,99,235,0.4); }
        .uca-card { background: #111827; padding: 35px; border-radius: 16px; border: 1px solid #374151; }
    </style>
</head>
<body>
    <header>
        <div style="font-size:1.5rem; font-weight:900; letter-spacing:-1px;">UCA <span style="color:var(--primary)">COMMAND CENTER</span></div>
        <div style="text-align:right;"><strong>Mthulisi Zulu</strong><br><small style="color:var(--primary)">Cloud Governance Architect</small></div>
    </header>
    <main>
        <div id="sidebar"><div id="engineList"></div></div>
        <div id="content">
            <h1 id="coreTitle">SYSTEM INITIALIZED</h1>
            <p id="coreOver" style="font-size:1.2rem; opacity:0.8; margin-bottom:30px;"></p>
            <div class="uca-card">
                <h4 style="color:var(--primary); text-transform:uppercase; margin-top:0;">Architectural Directives</h4>
                <div id="coreOut" style="line-height:1.6; font-size:1.1rem;">Bypassing legacy cache... System Ready.</div>
            </div>
        </div>
    </main>
    <script>
        // HARD-WIRED DATA: NO FETCH, NO SEARCHING, NO DELAY
        const UCA_CORE_DATA = [
            { id: 1, t: "01: Cloud Foundations", o: "Regions, AZs, and Global Latency.", c: "• High Availability Design<br>• Blast Radius Containment" },
            { id: 2, t: "02: IAM Governance", o: "Identity as the new perimeter.", c: "• Zero Trust Roles<br>• Permission Boundaries" },
            { id: 3, t: "03: VPC Networking", o: "Global Mesh and Segmentation.", c: "• Transit Gateway Logic<br>• Tiered Subnets" }
        ];

        function deployUI() {
            const list = document.getElementById('engineList');
            list.innerHTML = '';
            UCA_CORE_DATA.forEach(data => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.innerHTML = data.t;
                btn.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('coreTitle').innerText = data.t;
                    document.getElementById('coreOver').innerText = data.o;
                    document.getElementById('coreOut').innerHTML = data.c;
                };
                list.appendChild(btn);
            });
            // Immediate execution of first node
            if(UCA_CORE_DATA.length > 0) list.firstChild.click();
        }
        
        deployUI();
    </script>
</body>
</html>
