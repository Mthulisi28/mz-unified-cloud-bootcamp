<!DOCTYPE html>
<html>
<head><title>UCA OVERRIDE</title></head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:50px;">
    <h1>UCA MACHINE: BOOTED</h1>
    <div id="out" style="border:1px solid #333; padding:20px; border-radius:10px;">
        <h2 id="t">Loading Data...</h2>
        <p id="o"></p>
        <button onclick="comp()" style="background:blue; color:#fff; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">MARK COMPLETE</button>
    </div>
    <script>
        const d = [
            {id:1, t:"Session 1: Foundations", o:"High-ticket HA architecture."},
            {id:2, t:"Session 2: IAM", o:"Governance as a service."},
            {id:3, t:"Session 3: VPC", o:"Global network mesh."}
        ];
        let p = JSON.parse(localStorage.getItem('p')) || [1];
        function render(id) {
            const s = d.find(x => x.id == id);
            document.getElementById('t').innerText = s.t;
            document.getElementById('o').innerText = s.o;
            localStorage.setItem('last', id);
        }
        function comp() {
            let last = localStorage.getItem('last') || 1;
            if(!p.includes(Number(last))) p.push(Number(last));
            localStorage.setItem('p', JSON.stringify(p));
            if(Number(last) < d.length) render(Number(last) + 1);
            alert("Session Optimized. Moving to next high-value module.");
        }
        window.onload = () => render(localStorage.getItem('last') || 1);
    </script>
</body>
</html>
