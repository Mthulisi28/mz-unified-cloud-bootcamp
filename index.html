<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ◆ CACHE CONTROL (IMPORTANT FOR GITHUB PAGES) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>MZ Unified Cloud Bootcamp LMS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
    }

    .profile {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #38bdf8;
    }

    .logo {
      width: 70px;
    }

    .brand-center {
      text-align: center;
      flex: 1;
    }

    .brand-center h1 {
      margin: 0;
      font-size: 18px;
      color: #38bdf8;
    }

    .brand-center p {
      margin: 0;
      font-size: 12px;
      color: #94a3b8;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      top: 90px;
      left: 0;
      width: 280px;
      height: calc(100vh - 90px);
      background: #0f172a;
      padding: 20px;
    }

    .session {
      padding: 10px;
      margin-bottom: 8px;
      background: #111827;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .session:hover {
      background: #1f2937;
      border-left: 3px solid #38bdf8;
      transform: translateX(3px);
    }

    /* ===== MAIN ===== */
    .main {
      margin-left: 280px;
      padding: 120px 40px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-bottom: 20px;
    }

    .score {
      color: #22c55e;
      font-size: 18px;
    }

    #quizBox {
      display: none;
    }

    /* VERSION TAG (FOR DEBUGGING) */
    .version {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 11px;
      color: #64748b;
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <img src="assets/images/mthulisi.png" class="profile">

  <div class="brand-center">
    <h1>◆ MZ Unified Cloud Bootcamp</h1>
    <p>Student LMS Platform</p>
  </div>

  <img src="assets/images/mz-logo.png" class="logo">

</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Sessions</h3>

  <div class="session" onclick="openSession(1)">01 - Cloud Foundations</div>
  <div class="session" onclick="openSession(2)">02 - Shared Responsibility</div>
  <div class="session" onclick="openSession(3)">03 - IAM Deep Dive</div>
  <div class="session" onclick="openSession(4)">04 - VPC Networking</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="card">
    <h2>Student Dashboard</h2>
    <p id="sessionView">Select a session</p>
  </div>

  <div class="card" id="quizBox">

    <h2>Mini Assessment</h2>

    <p id="questionText"></p>

    <button onclick="answer('A')">Option A</button>
    <button onclick="answer('B')">Option B</button>

    <p class="score" id="score">Score: 0</p>

  </div>

</div>

<!-- VERSION MARKER -->
<div class="version">v3.8.0-production</div>

<script>

/* ===== STATE ===== */
let score = 0;
let sessionAnswered = false;
let currentCorrect = null;

/* ===== SESSIONS ===== */
const sessions = {
  1: {
    title: "Cloud Foundations",
    question: "What is a cloud region in AWS?",
    correct: "A"
  },
  2: {
    title: "Shared Responsibility",
    question: "Who secures infrastructure in AWS?",
    correct: "B"
  },
  3: {
    title: "IAM Deep Dive",
    question: "What is IAM used for?",
    correct: "A"
  },
  4: {
    title: "VPC Networking",
    question: "What does a VPC control?",
    correct: "B"
  }
};

/* ===== OPEN SESSION ===== */
function openSession(id){

  sessionAnswered = false;

  const session = sessions[id];

  if(!session){
    console.error("Session not found");
    return;
  }

  currentCorrect = session.correct;

  document.getElementById("sessionView").innerText =
    "Viewing Session " + id + " - " + session.title;

  document.getElementById("quizBox").style.display = "block";

  document.getElementById("questionText").innerText =
    session.question;
}

/* ===== ANSWER LOGIC ===== */
function answer(selected){

  if(sessionAnswered){
    alert("You already answered this session.");
    return;
  }

  if(selected === currentCorrect){
    score += 10;
    document.getElementById("score").innerText = "Score: " + score;
  } else {
    alert("Incorrect answer");
  }

  sessionAnswered = true;
}

</script>

</body>
</html>
