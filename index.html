<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCA MACHINE | Mthulisi Zulu</title>
    <style>
        :root { --primary: #3b82f6; --bg: #030712; --card: #111827; --text: #f9fafb; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { height: 80px; background: var(--card); border-bottom: 2px solid #1f2937; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 340px; background: #000; border-right: 1px solid #1f2937; padding: 25px; overflow-y: auto; }
        #content { flex: 1; padding: 60px; overflow-y: auto; }
        .session-btn { display: block; width: 100%; padding: 18px; margin-bottom: 12px; background: #1f2937; color: #fff; border: 1px solid transparent; text-align: left; cursor: pointer; border-radius: 10px; font-weight: 600; transition: 0.2s; }
        .session-btn:hover { border-color: var(--primary); background: #1e3a8a; }
        .session-btn.active { border-color: var(--primary); background: #2563eb; box-shadow: 0 0 15px rgba(37,99,235,0.4); }
        .uca-card { background: #111827; padding: 35px; border-radius: 16px; border: 1px solid #374151; }
    </style>
</head>
<body>
    <header>
        <div style="font-size:1.5rem; font-weight:900; letter-spacing:-1px;">UCA <span style="color:var(--primary)">BOOTCAMP</span></div>
        <div style="text-align:right;"><strong>Mthulisi Zulu</strong><br><small style="color:var(--primary)">Cloud Governance Architect</small></div>
    </header>
    <main>
        <div id="sidebar"><div id="sList"></div></div>
        <div id="content">
            <h1 id="sTitle">MACHINE ONLINE</h1>
            <p id="sOver" style="font-size:1.2rem; opacity:0.8; margin-bottom:30px;"></p>
            <div class="uca-card">
                <h4 style="color:var(--primary); text-transform:uppercase; margin-top:0;">Governance Outcomes</h4>
                <div id="sOut" style="line-height:1.6; font-size:1.1rem;">Select a session to begin.</div>
            </div>
        </div>
    </main>
    <script>
        const sessions = [
            { id: 1, t: "01: Cloud Foundations", o: "Regions, AZs, and Global Latency.", c: "• High Availability Design<br>• Blast Radius Containment" },
            { id: 2, t: "02: IAM Governance", o: "Identity as the new perimeter.", c: "• Zero Trust Roles<br>• Permission Boundaries" },
            { id: 3, t: "03: VPC Networking", o: "Global Mesh and Segmentation.", c: "• Transit Gateway Logic<br>• Tiered Subnets" }
        ];

        function init() {
            const list = document.getElementById('sList');
            list.innerHTML = '';
            sessions.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'session-btn';
                btn.innerHTML = s.t;
                btn.onclick = () => {
                    document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('sTitle').innerText = s.t;
                    document.getElementById('sOver').innerText = s.o;
                    document.getElementById('sOut').innerHTML = s.c;
                };
                list.appendChild(btn);
            });
            // Auto-click first session
            if(sessions.length > 0) list.firstChild.click();
        }
        
        // Force execution even if DOM is weird
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
