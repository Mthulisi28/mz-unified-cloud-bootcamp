<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCA Roadmap | Premium Portal</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        #content { flex: 1; padding: 40px; overflow-y: auto; }
        .session-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: #334155; color: white; border: none; text-align: left; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .session-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .session-btn.active { border-left: 4px solid #3b82f6; background: #475569; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; margin-top: 20px; border: 1px solid #334155; }
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }
        .action-btn { padding: 12px 24px; border-radius: 6px; cursor: pointer; text-decoration: none; font-weight: bold; border: none; }
        .primary { background: #3b82f6; color: white; }
        .success { background: #10b981; color: white; }
    </style>
</head>
<body>
    <div id="sidebar"><h3>UCA Roadmap</h3><div id="sessionList"></div></div>
    <div id="content">
        <h1 id="sessionTitle">Select a Session</h1>
        <p id="overview" style="color: #cbd5e1; font-size: 1.1rem;"></p>
        <div class="card">
            <h4>Lab Outcomes</h4>
            <pre id="outcomes" style="white-space: pre-wrap; color: #94a3b8;"></pre>
        </div>
        <div id="pdfArea" style="margin-top: 20px;"></div>
        <div class="btn-group">
            <button id="awsLink" class="action-btn primary" data-action="external">Lab Docs</button>
            <button id="videoLink" class="action-btn primary" data-action="external" style="background:#ef4444;">Watch Video</button>
            <button id="completeBtn" class="action-btn success">Complete & Unlock Next</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
