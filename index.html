<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ UCA BOOT CAMP | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #010409; color: #f0f6fc; }
        .prestige-header { 
            background: radial-gradient(circle at top, #1e3a8a 0%, #020617 100%); 
            border-bottom: 3px solid #d4af37;
        }
        .session-card { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .session-card:hover { 
            border-color: #d4af37; 
            box-shadow: 0 10px 40px -10px rgba(212, 175, 55, 0.2);
            transform: translateY(-12px);
        }
        .gold-ink { color: #d4af37; }
        .btn-prestige { 
            background: linear-gradient(135deg, #d4af37 0%, #996515 100%); 
            color: #010409; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-radius: 2px;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="py-28 text-center prestige-header">
        <img src="assets/mz-logo.png" alt="MZ Logo" class="mx-auto w-40 mb-10 drop-shadow-[0_0_25px_rgba(212,175,55,0.6)]">
        <h1 class="text-8xl font-black tracking-tighter text-white uppercase italic">MZ UCA</h1>
        <h2 class="text-4xl font-bold text-white mt-2 tracking-widest">BOOT CAMP</h2>
        <div class="h-1 w-24 bg-[#d4af37] mx-auto mt-6"></div>
        <p class="text-xl mt-6 font-semibold tracking-[0.6em] gold-ink uppercase text-shadow-sm">Unified Cloud Architecture Sessions</p>
    </header>

    <main class="max-w-7xl mx-auto px-10 py-24">
        
        <div class="flex flex-col md:flex-row items-center justify-between mb-32 bg-[#161b22] p-16 rounded-sm border border-gray-800 shadow-2xl">
            <div class="flex items-center">
                <img src="assets/mthulisi.png" alt="Architect" class="w-48 h-48 border-4 border-[#d4af37] shadow-2xl object-cover">
                <div class="ml-12 text-left">
                    <h2 class="text-6xl font-black text-white tracking-tighter">Mthulisi Zulu</h2>
                    <p class="gold-ink font-bold text-2xl uppercase tracking-[0.2em] mt-2">Global Cloud Architect</p>
                </div>
            </div>
            <div class="hidden lg:block">
                <span class="text-gray-800 text-9xl font-black select-none opacity-20">UCA</span>
            </div>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-16">
            <div class="session-card p-14 bg-gradient-to-b from-[#0d1117] to-[#161b22]">
                <p class="gold-ink text-xs font-black tracking-[0.5em] mb-6 uppercase">Session 01</p>
                <h3 class="text-3xl font-black text-white mb-8 uppercase">Foundations</h3>
                <a href="https://console.aws.amazon.com/" target="_blank" class="block text-center py-6 btn-prestige">ENTER CONSOLE</a>
            </div>

            <div class="session-card p-14 bg-gradient-to-b from-[#0d1117] to-[#161b22]">
                <p class="gold-ink text-xs font-black tracking-[0.5em] mb-6 uppercase">Session 02</p>
                <h3 class="text-3xl font-black text-white mb-8 uppercase">Security</h3>
                <a href="https://console.aws.amazon.com/artifact/" target="_blank" class="block text-center py-6 btn-prestige">EXECUTE ARTIFACT</a>
            </div>

            <div class="session-card p-14 bg-gradient-to-b from-[#0d1117] to-[#161b22]">
                <p class="gold-ink text-xs font-black tracking-[0.5em] mb-6 uppercase">Session 03</p>
                <h3 class="text-3xl font-black text-white mb-8 uppercase">Identity</h3>
                <a href="https://console.aws.amazon.com/iam/home" target="_blank" class="block text-center py-6 btn-prestige">IDENT CONTROL</a>
            </div>
        </div>

        <footer class="mt-48 text-center text-gray-800 border-t border-gray-900 pt-20">
            <p class="uppercase tracking-[0.8em] text-xs font-black gold-ink opacity-40 italic">MZ UCA BOOT CAMP | 2026</p>
        </footer>
    </main>
</body>
</html>
