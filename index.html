//////////////////////////////////////////////////////
// ◆ SAFE NAVIGATION (NO MULTI-OPEN BUG)
//////////////////////////////////////////////////////

let navigationLock = false;

function safeOpen(url){

if (navigationLock) return;

navigationLock = true;

const win = window.open(url, "_blank", "noopener,noreferrer");

if (!win) {
    // fallback if popup blocked
    window.location.href = url;
}

setTimeout(() => {
    navigationLock = false;
}, 800);

}

//////////////////////////////////////////////////////
// ◆ CLEAN EVENT BINDING (NO STACKING)
//////////////////////////////////////////////////////

function bindLinks(session){

const awsBtn = document.getElementById("awsLink");
const videoBtn = document.getElementById("videoLink");

// FULL RESET (prevents duplicate listeners)
const newAwsBtn = awsBtn.cloneNode(true);
const newVideoBtn = videoBtn.cloneNode(true);

awsBtn.parentNode.replaceChild(newAwsBtn, awsBtn);
videoBtn.parentNode.replaceChild(newVideoBtn, videoBtn);

// RE-BIND CLEAN EVENTS
document.getElementById("awsLink").onclick = function(e){
    e.preventDefault();
    e.stopPropagation();
    safeOpen(session.aws);
};

document.getElementById("videoLink").onclick = function(e){
    e.preventDefault();
    e.stopPropagation();
    safeOpen(session.video);
};

}

//////////////////////////////////////////////////////
// ◆ MAIN SESSION LOADER (STATE RESET FIXED)
//////////////////////////////////////////////////////

function openSession(id){

const session = sessions[id];

// HARD RESET (prevents visual layering)
document.getElementById("sessionTitle").innerText = "";
document.getElementById("overview").innerText = "";
document.getElementById("outcomes").innerText = "";
document.getElementById("labs").innerHTML = "";

// REBUILD STATE CLEANLY
document.getElementById("sessionTitle").innerText = session.title;

document.getElementById("overview").innerText = session.overview;

document.getElementById("outcomes").innerText = session.outcomes;

document.getElementById("labs").innerHTML = session.labs;

document.getElementById("heroText").innerText =
"Currently viewing: " + session.title;

// BIND LINKS SAFELY
bindLinks(session);

// UX IMPROVEMENT
window.scrollTo({ top: 0, behavior: "smooth" });

}

//////////////////////////////////////////////////////
// ◆ REMOVE GITHUB HASH SIDE EFFECTS
//////////////////////////////////////////////////////

if (window.location.hash) {
    window.history.replaceState(null, null, window.location.pathname);
}

//////////////////////////////////////////////////////
// ◆ DEFAULT LOAD
//////////////////////////////////////////////////////

window.onload = function(){
    openSession(1);
