<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ | UCA Cloud Bootcamp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --gold: #d4af37; --gold-dim: #8a6f1e; --bg: #05070a; --surface: #0b0e14; --border: #1a2030; --text-muted: #4b5563; }
        body { background-color: var(--bg); color: #e5e7eb; font-family: 'Space Mono', monospace; min-height: 100vh; }
        .page-wrap { max-width: 1280px; margin: 0 auto; padding: 4rem 2rem; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 3rem; }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem); color: #ffffff; text-transform: uppercase; line-height: 0.9; }
        .session-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .card { background: var(--surface); padding: 1.5rem; position: relative; min-height: 200px; display: flex; flex-direction: column; }
        .card.active::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--gold); }
        .card.locked { opacity: 0.25; filter: grayscale(1); }
        .card-num { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 0.5rem; }
        .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: #fff; flex-grow: 1; text-transform: uppercase; }
        .card-link { font-size: 10px; color: #6b7280; text-transform: uppercase; text-decoration: none; margin-top: 0.5rem; display: block; transition: color 0.2s; }
        .card-link:hover { color: #fff; }
        .card-link::before { content: '◈ '; color: var(--gold); }
    </style>
</head>
<body>
<div class="page-wrap">
    <header>
        <p style="color:var(--gold); font-size: 10px; letter-spacing: 2px;">◈ UCA GLOBAL ACADEMY</p>
        <h1>Unified Cloud<br>Architecture</h1>
    </header>

    <div class="session-grid">
        <div class="card active"><p class="card-num">S-01</p><h3 class="card-title">Foundations</h3><a href="assets/WEEK 1 — SESSION 1.pdf" class="card-link">View Assets</a></div>
        <div class="card active"><p class="card-num">S-02</p><h3 class="card-title">Shared Resp</h3><a href="assets/session2sharedresp.pdf" class="card-link">View Assets</a></div>
        <div class="card active"><p class="card-num">S-03</p><h3 class="card-title">IAM Masterclass</h3><a href="assets/SESSION3 Identity & Access Management (IAM).pdf" class="card-link">View Assets</a></div>

        <div class="card active">
            <p class="card-num">S-04</p>
            <h3 class="card-title">Compute Layer<br>(EC2 & Lambda)</h3>
            <a href="assets/WEEK 2 — SESSION 4.pdf" target="_blank" class="card-link">Launch Session Slides</a>
            <a href="#" class="card-link">System Docs</a>
        </div>

        <div class="card locked"><p class="card-num">S-05</p><h3 class="card-title">Storage</h3></div>
        <div class="card locked"><p class="card-num">S-06</p><h3 class="card-title">Databases</h3></div>
    </div>
</div>
</body>
</html>
