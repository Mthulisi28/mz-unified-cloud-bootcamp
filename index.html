<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCA Roadmap | Mthulisi Zulu</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { height: 70px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid #334155; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 300px; background: #111827; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        #content { flex: 1; padding: 40px; overflow-y: auto; }
        .session-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: var(--card); color: white; border: none; text-align: left; cursor: pointer; border-radius: 8px; }
        .session-btn.active { border: 1px solid var(--primary); background: #2d3748; }
        .uca-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        .action-btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; color: white; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <header>
        <div><img src="assets/mz-logo.png" style="height:40px;" onerror="this.style.display='none'"> <strong>UCA BOOTCAMP</strong></div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="text-align:right;"><small>Instructor</small><br><strong>Mthulisi Zulu</strong><br><small style="color:var(--primary)">Cloud Governance Architect</small></div>
            <img src="assets/mthulisi.jpg" class="profile-img" onerror="this.src='https://via.placeholder.com/50'">
        </div>
    </header>
    <main>
        <div id="sidebar"><div id="sessionList"></div></div>
        <div id="content">
            <h1 id="sessionTitle">Booting Machine...</h1>
            <p id="overview"></p>
            <div class="uca-card"><h3>Lab Outcomes</h3><pre id="outcomes" style="color:#94a3b8;"></pre></div>
            <div id="pdfArea" style="margin:20px 0;"></div>
            <div style="display:flex; gap:15px;">
                <button id="awsLink" class="action-btn" style="background:var(--primary)">Lab Docs</button>
                <button id="completeBtn" class="action-btn" style="background:#10b981">Complete & Unlock</button>
            </div>
            <p style="margin-top:50px; opacity:0.5; font-size:0.8rem;">© 2022 Mthulisi Zulu. Global Cloud Business Operations.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
